server {
    listen 443 ssl http2;
    server_name licensing.speechy.app;

    root /var/www/speechy-licensing;
    index index.php;

    # SSL (managed by certbot or similar)
    ssl_certificate     /etc/letsencrypt/live/licensing.speechy.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/licensing.speechy.app/privkey.pem;

    # Block access to sensitive files
    location ~ ^/(config\.php|config\.example\.php|db\.php|helpers\.php|migrate\.php|migrations/) {
        deny all;
        return 404;
    }

    # Rate limiting zone (define in http block)
    # limit_req_zone $binary_remote_addr zone=app_api:10m rate=10r/s;

    # App-facing endpoints — rate limited
    location /api/license/ {
        # limit_req zone=app_api burst=20 nodelay;

        try_files $uri /index.php$is_args$args;
    }

    # Admin endpoints
    location /api/admin/ {
        try_files $uri /index.php$is_args$args;
    }

    # Route all requests through index.php
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
